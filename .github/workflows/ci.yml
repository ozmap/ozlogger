name: CI - Tests & Coverage

on:
    pull_request:
        branches:
            - master
            - main
            - develop
    push:
        branches:
            - master
            - main
            - develop

jobs:
    test:
        runs-on: ubuntu-latest
        name: Tests & Coverage Check

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'

            - name: Install pnpm
              uses: pnpm/action-setup@v2
              with:
                  version: 8

            - name: Install dependencies
              run: pnpm install

            - name: Run tests with coverage
              run: pnpm test

            - name: Check coverage threshold
              run: |
                  echo "Coverage threshold is enforced by Jest config (95% statements and lines)"
                  echo "If tests passed, coverage is above threshold"

            - name: Upload coverage report
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: coverage-report
                  path: coverage/
                  retention-days: 7
